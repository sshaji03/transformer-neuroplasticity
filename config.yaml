    num_classes: 4
    text_col: text
    label_col: label
  - name: dair-ai/emotion
    num_classes: 6
    text_col: text
    label_col: label
  - name: fancyzhx/dbpedia_14
    num_classes: 14
    text_col: content
    label_col: label
  - name: yahoo_answers_topics
    num_classes: 10
    text_col: question_title
    label_col: topic
